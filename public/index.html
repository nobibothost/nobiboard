<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gboard API Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .dashboard-card {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            padding: 30px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
        }
        h2 {
            color: #333;
            margin-top: 0;
            text-align: center;
        }
        .status-indicator {
            display: inline-block;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .active { background-color: #28a745; }
        .inactive { background-color: #dc3545; }
        .data-row {
            margin: 15px 0;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .data-label {
            font-size: 14px;
            color: #6c757d;
        }
        .data-value {
            font-size: 18px;
            font-weight: bold;
            color: #212529;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-size: 14px;
            font-weight: bold;
        }
        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
        }
        textarea.form-control {
            resize: vertical;
            min-height: 120px;
        }
        .helper-text {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
            display: block;
        }
        .btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #0056b3;
        }
        .btn-success {
            background-color: #28a745;
        }
        .btn-success:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

    <div class="dashboard-card">
        <h2>System Dashboard</h2>
        
        <div class="data-row">
            <span class="data-label">API Service Status</span>
            <div>
                <span id="serviceDot" class="status-indicator inactive"></span>
                <span id="serviceText" class="data-value">Checking...</span>
            </div>
        </div>

        <div class="data-row">
            <span class="data-label">Database Status</span>
            <span class="data-value" id="dbText">Checking...</span>
        </div>

        <div class="data-row">
            <span class="data-label">Global Words Saved</span>
            <span class="data-value" id="wordCount">--</span>
        </div>

        <button class="btn" onclick="fetchStatus()">Refresh Data</button>
    </div>

    <div class="dashboard-card">
        <h2>AI Smart Importer</h2>
        
        <div class="form-group">
            <label>Master API Secret Key</label>
            <input type="password" id="apiKeyInput" class="form-control" placeholder="Required for database access">
        </div>

        <div class="form-group">
            <label>Groq API Key (Optional but Recommended)</label>
            <input type="password" id="groqKeyInput" class="form-control" placeholder="gsk_xxxxxxxxxxxxxxxxxxx">
            <span class="helper-text">If provided, Groq AI will strictly filter out gibberish, bad spellings, and invalid entries before saving.</span>
        </div>

        <div class="form-group">
            <label>Paste Paragraphs or Stories</label>
            <textarea id="importText" class="form-control" placeholder="Paste your story or large text here..."></textarea>
        </div>

        <button class="btn btn-success" onclick="importWords()" id="importBtn">Process & Import Words</button>
    </div>

    <script>
        async function fetchStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                const serviceDot = document.getElementById('serviceDot');
                const serviceText = document.getElementById('serviceText');
                if(data.serviceStatus === 'Active') {
                    serviceDot.className = 'status-indicator active';
                    serviceText.innerText = 'Active';
                } else {
                    serviceDot.className = 'status-indicator inactive';
                    serviceText.innerText = 'Offline';
                }

                const dbText = document.getElementById('dbText');
                if(data.databaseConnected) {
                    dbText.innerText = 'Connected ✅';
                    dbText.style.color = '#28a745';
                } else {
                    dbText.innerText = 'Disconnected ❌';
                    dbText.style.color = '#dc3545';
                }

                document.getElementById('wordCount').innerText = data.totalWordsSaved;

            } catch (error) {
                document.getElementById('serviceDot').className = 'status-indicator inactive';
                document.getElementById('serviceText').innerText = 'Server Error';
                document.getElementById('dbText').innerText = 'Offline';
                document.getElementById('wordCount').innerText = 'Error';
            }
        }

        async function importWords() {
            const apiKey = document.getElementById('apiKeyInput').value;
            const groqKey = document.getElementById('groqKeyInput').value;
            const wordsText = document.getElementById('importText').value;
            const btn = document.getElementById('importBtn');

            if (!apiKey) {
                alert("Please enter Master API Secret Key");
                return;
            }
            if (!wordsText.trim()) {
                alert("Please paste some paragraphs or stories to import");
                return;
            }

            btn.disabled = true;
            btn.innerText = groqKey ? "Groq AI is Cleaning Words..." : "Importing...";

            try {
                const response = await fetch('/api/import_words', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': apiKey
                    },
                    body: JSON.stringify({ wordsText, groqKey })
                });

                const result = await response.json();
                
                if (response.status === 200) {
                    alert(result.message);
                    document.getElementById('importText').value = '';
                    fetchStatus(); // Update count
                } else {
                    alert("Error: " + (result.error || "Failed to import"));
                }
            } catch (error) {
                alert("Network error occurred.");
            }

            btn.disabled = false;
            btn.innerText = "Process & Import Words";
        }

        fetchStatus();
    </script>
</body>
</html>
